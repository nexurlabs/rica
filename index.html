<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rica documentation: self-hosted BYOK AI Discord assistant by NexurLabs." />
  <title>Rica Docs — AI Discord Assistant</title>
  <link rel="icon" type="image/png" href="https://nexurlabs.com/logo.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css" />
  <style>
    :root {
      --theme-color: #f5c84c;
      --base-background-color: #080b13;
      --base-color: #dbe4ff;
      --heading-color: #ffffff;
      --sidebar-background: #0b1020;
      --sidebar-nav-link-color: #b9c4e2;
      --sidebar-nav-link-color--active: #f5c84c;
      --code-theme-background: #101827;
      --blockquote-background: rgba(245, 200, 76, 0.08);
      --blockquote-border-color: #f5c84c;
      --link-color: #f5c84c;
      --table-cell-border-color: #22304a;
      --table-head-background: #111a2d;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(245, 200, 76, 0.16), transparent 28rem),
        radial-gradient(circle at 85% 15%, rgba(123, 92, 255, 0.18), transparent 28rem),
        radial-gradient(circle at 55% 90%, rgba(66, 211, 255, 0.10), transparent 26rem);
      z-index: -1;
    }
    .app-name-link {
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .markdown-section {
      max-width: 980px;
    }
    .markdown-section h1 {
      letter-spacing: -0.05em;
    }
    .markdown-section h2 {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: .35rem;
    }
    .markdown-section pre,
    .markdown-section table {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      overflow: hidden;
    }
    .sidebar-toggle {
      background: rgba(8, 11, 19, .8);
    }
  </style>
</head>
<body>
  <div id="app">Loading Rica documentation...</div>
  <script>
    window.$docsify = {
      name: 'Rica Docs',
      repo: 'nexurlabs/rica',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search Rica docs',
        noData: 'No matching docs found',
        depth: 3
      },
      pagination: { previousText: 'Previous', nextText: 'Next' },
      copyCode: { buttonText: 'Copy', errorText: 'Error', successText: 'Copied' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
</body>
</html>
